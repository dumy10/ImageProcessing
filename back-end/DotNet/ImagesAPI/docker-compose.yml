version: '3.8'

services:
  imagesapi:
    build:
      context: ../../../
      dockerfile: back-end/DotNet/ImagesAPI/ImagesAPI/Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - mongodb
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - MONGODB_CONNECTION_STRING=${MONGODB_CONNECTION_STRING}
      - MONGODB_DATABASE_NAME=${MONGODB_DATABASE_NAME}
      - MONGODB_COLLECTION_NAME=${MONGODB_COLLECTION_NAME}
      - MONGODB_USERS_COLLECTION_NAME=${MONGODB_USERS_COLLECTION_NAME}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET}
      - DROPBOX_REFRESH_TOKEN=${DROPBOX_REFRESH_TOKEN}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      - RUNNING_IN_DOCKER=${RUNNING_IN_DOCKER}
    # Healthcheck to ensure the API is running properly
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    # Healthcheck to ensure MongoDB is running properly
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data: