<div *ngIf="node" class="treeNodeContainer">
  <!-- Parent Node -->
  <div class="treeNode">
    <img
      [src]="node.value.url"
      alt="Image"
      class="treeNodeImage"
      (click)="openDialog(node.value)"
      loading="lazy"
      (error)="onImageError(node.value)"
      role="button"
      aria-label="Open image dialog"
    />
  </div>

  <!-- Child Nodes and Connecting Arrows - Only show if within max depth -->
  <ng-container *ngIf="node.children.length > 0 && shouldDisplayChildren()">
    <!-- Show indication if images are hidden -->
    <div *ngIf="getHiddenChildrenCount() > 0" class="hiddenChildrenIndicator">
      + {{ getHiddenChildrenCount() }} more filtered image{{
        getHiddenChildrenCount() > 1 ? "s" : ""
      }}
    </div>

    <!-- SVG for arrows connecting parent to children -->
    <svg
      class="treeArrowsSvg"
      [attr.viewBox]="'0 0 ' + getSvgViewBoxWidth() + ' 80'"
      [attr.width]="getSvgViewBoxWidth()"
      height="80"
    >
      <!-- Parent to branch point line -->
      <line
        [attr.x1]="getSvgCenterX()"
        y1="0"
        [attr.x2]="getSvgCenterX()"
        y2="30"
        class="treeArrow"
      ></line>

      <!-- Horizontal connector line when multiple children -->
      <line
        *ngIf="getDisplayedChildren().length > 1"
        [attr.x1]="100"
        y1="30"
        [attr.x2]="getSvgViewBoxWidth() - 100"
        y2="30"
        class="treeArrow"
      ></line>

      <!-- Lines and arrows to each child node with filter labels -->
      <ng-container *ngFor="let child of getDisplayedChildren(); let i = index">
        <!-- Vertical line to child -->
        <line
          [attr.x1]="i * 200 + 100"
          y1="30"
          [attr.x2]="i * 200 + 100"
          y2="70"
          class="treeArrow"
        ></line>

        <!-- Filter name on the line -->
        <text
          *ngIf="
            child.value.appliedFilters && child.value.appliedFilters.length
          "
          [attr.x]="i * 200 + 100"
          y="50"
          class="filterLabel"
          text-anchor="middle"
          dominant-baseline="middle"
        >
          {{
            child.value.appliedFilters[child.value.appliedFilters.length - 1]
          }}
        </text>

        <!-- Arrow head pointing to child -->
        <polygon
          [attr.points]="
            i * 200 +
            95 +
            ' 70, ' +
            (i * 200 + 100) +
            ' 80, ' +
            (i * 200 + 105) +
            ' 70'
          "
          class="arrowHead"
        ></polygon>
      </ng-container>
    </svg>

    <!-- Container for horizontally arranged child nodes -->
    <div class="treeNodeChildren">
      <div
        *ngFor="let child of getDisplayedChildren()"
        class="childNodeWrapper"
      >
        <app-image-tree
          [node]="child"
          [imagePairs]="imagePairs"
          [maxDepth]="maxDepth"
          [currentDepth]="currentDepth + 1"
          [horizontalDisplayCount]="horizontalDisplayCount"
          class="childTreeNode"
        ></app-image-tree>
      </div>
    </div>
  </ng-container>
</div>
