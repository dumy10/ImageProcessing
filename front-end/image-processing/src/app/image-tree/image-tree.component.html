<!-- Error banner component -->
<app-error-banner
  [showBanner]="errorState"
  [errorMessage]="errorMessage"
  [actions]="errorActions"
  (dismiss)="errorState = false; errorMessage = ''"
></app-error-banner>

<!-- Main container with loading state handling -->
<div class="tree-visualization-container" *ngIf="node">
  <!-- Container for D3 tree visualization with direct reference -->
  <div class="d3-tree-container" #treeContainer></div>

  <!-- Loading indicator while tree is initializing -->
  <div class="tree-loading-overlay" *ngIf="!node.value.loaded">
    <mat-spinner diameter="40"></mat-spinner>
    <span>Loading tree visualization...</span>
  </div>
</div>

<!-- Fallback when no data is available -->
<div class="no-data-message" *ngIf="!node">
  <p>No image data available for visualization</p>
</div>

<!-- Loading overlay for download operations -->
<app-loading
  *ngIf="loading"
  [loading]="loading"
  [message]="loadingMessage"
></app-loading>
