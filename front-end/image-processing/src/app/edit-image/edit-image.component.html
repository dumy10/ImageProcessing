<div class="image-container">
  <div class="filter-buttons">
    <button
      mat-button
      *ngFor="let filter of filters"
      (click)="filterImage(filter)"
    >
      {{ filter }}
    </button>
  </div>

  <div class="image-display">
    <img [src]="imagePath" alt="Image to be processed" class="image" (error)="onImageError()" />

    <div class="save-button">
      <button mat-button (click)="downloadImage()">
        <mat-icon class="button">save</mat-icon>
      </button>
    </div>

  </div>
</div>

<app-loading [loading]="loading" [message]="loadingMessage" />
