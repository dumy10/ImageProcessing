<div
  class="container"
  [class.sidebar-collapsed]="sidebarCollapsed"
  [class.error-state]="errorState && !image?.loaded"
  [class.loading-state]="imageLoadTimeout && !image?.loaded"
>
  <!-- Filter sidebar component -->
  <app-filter-sidebar
    *ngIf="image?.loaded"
    [image]="image"
    [filters]="filters"
    [sidebarCollapsed]="sidebarCollapsed"
    [canUndo]="canUndo()"
    [canRedo]="canRedo()"
    (filterSelected)="filterImage($event)"
    (toggleSidebarEvent)="toggleSidebar()"
    (downloadImageEvent)="downloadImage()"
    (undoEvent)="undoFilter()"
    (redoEvent)="redoFilter()"
  ></app-filter-sidebar>

  <!-- Main image panel -->
  <div
    class="image-panel"
    [class.full-page]="errorState && !image?.loaded"
    [class.loading]="imageLoadTimeout && !image?.loaded"
  >
    <!-- Error banner -->
    <app-error-banner
      [showBanner]="errorState"
      [errorMessage]="errorMessage"
      [actions]="errorActions"
      (dismiss)="dismissError()"
    ></app-error-banner>

    <!-- Image display area with loading indicator -->
    <div
      class="image-container"
      [class.full-page]="!image?.loaded || (imageLoadTimeout && !image?.loaded)"
    >
      <!-- Loading indicator shows during the delay period -->
      <div
        class="image-loading-container"
        *ngIf="imageLoadTimeout && !image?.loaded"
      >
        <div class="image-loading-spinner">
          <mat-icon class="rotating">sync</mat-icon>
        </div>
        <span class="image-loading-text">Attempting to load image...</span>
      </div>

      <div class="image-display">
        <img
          #imageElement
          [src]="imagePath"
          alt="Image to be processed"
          class="image"
          (error)="onImageError()"
          (load)="onImageLoad()"
        />
        <!-- Filter operation overlay - show only during filter operations -->
        <div class="filter-operation-overlay" *ngIf="loading && image?.loaded">
          <div class="filter-operation-container">
            <div class="filter-operation-spinner">
              <mat-icon class="rotating">sync</mat-icon>
            </div>
            <span class="filter-operation-text">{{ loadingMessage }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<app-loading
  *ngIf="loading && !image?.loaded"
  [loading]="loading"
  [message]="loadingMessage"
/>
