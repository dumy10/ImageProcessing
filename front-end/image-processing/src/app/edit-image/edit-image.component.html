<div class="container">
  <div class="image-container">
    <div *ngIf="!isMobileView && image?.loaded">
      <app-filter-buttons
        [filters]="filters"
        (filterSelected)="filterImage($event)"
      ></app-filter-buttons>
    </div>

    <div class="dropdown" *ngIf="isMobileView && image?.loaded">
      <button
        mat-button
        (click)="toggleDropdown()"
        aria-label="Toggle filter dropdown"
      >
        Filters <mat-icon>menu</mat-icon>
      </button>
      <div
        [ngClass]="{ show: dropdownOpen }"
        class="dropdown-menu"
        role="menu"
        aria-label="Filter menu"
      >
        <app-filter-buttons
          [filters]="filters"
          (filterSelected)="filterImage($event)"
        ></app-filter-buttons>
      </div>
    </div>

    <div class="image-display">
      <img
        [src]="imagePath"
        alt="Image to be processed"
        class="image"
        (error)="onImageError()"
        (load)="onImageLoad()"
      />
      <div
        *ngIf="image?.appliedFilters !== null && image?.loaded"
        class="undo-button-container"
      >
        <button mat-button (click)="undoFilter()" aria-label="Undo last filter">
          <mat-icon class="undo-button">undo</mat-icon>
        </button>
      </div>
    </div>
  </div>

  <div class="save-button" *ngIf="image?.loaded">
    <button
      mat-button
      (click)="downloadImage()"
      aria-label="Download processed image"
    >
      <mat-icon>download</mat-icon>Download Image
    </button>
  </div>
</div>

<app-loading *ngIf="loading" [loading]="loading" [message]="loadingMessage" />
