<div class="photo-editor-container">
  <div class="outer-box">
    <div class="outer-box-content">
      <h1>Image Processing</h1>
      <p>Upload an image and apply various filters to transform your photos.</p>

      <app-error-banner
        *ngIf="errorState"
        [errorMessage]="errorMessage"
        [showBanner]="errorState"
        [actions]="errorActions"
        (dismiss)="dismissError()"
      ></app-error-banner>

      <div
        class="inner-box dropzone"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)"
        aria-label="Image drop zone"
        [class.uploading]="showProgress"
      >
        <div
          class="editor-content"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)"
          (drop)="onDrop($event)"
        >
          <mat-icon
            class="photo-icon"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            >add_photo_alternate</mat-icon
          >
          <p>Drag & Drop your image here or</p>
          <button
            mat-button
            class="upload-button"
            (click)="onUploadClick()"
            aria-label="Upload your image"
          >
            <mat-icon class="button-icon">cloud_upload</mat-icon>
            Upload your image
          </button>
          <p class="supported-formats">Supported formats: JPG, JPEG, PNG</p>
        </div>

        <!-- Progress overlay for uploads -->
        <div class="upload-progress-overlay" *ngIf="showProgress">
          <div class="upload-progress-container">
            <div class="progress-bar-container">
              <div class="progress-bar-wrapper">
                <div
                  class="progress-bar"
                  [style.width.%]="progressPercentage"
                ></div>
              </div>
              <div class="progress-text">
                {{ progressPercentage }}% complete
              </div>
            </div>
            <div class="upload-progress-spinner">
              <mat-icon>cloud_upload</mat-icon>
            </div>
            <span class="upload-progress-text">{{ loadingMessage }}</span>
          </div>
        </div>

        <input
          type="file"
          id="imageUpload"
          (change)="onImageSelected($event)"
          accept="image/png, image/jpeg"
          style="display: none"
          aria-label="Image upload input"
        />
      </div>
    </div>
  </div>
</div>

<app-loading
  *ngIf="loading && !showProgress"
  [loading]="loading"
  [message]="loadingMessage"
/>
