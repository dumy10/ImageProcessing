<div class="photo-editor-container text-center">
  <div
    class="dropzone"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
  >
    <div class="editor-content">
      <h1>Image Processing</h1>
      <p>Upload an image and apply filters to it.</p>
      <p>Drag & Drop your image here or</p>
      <button mat-button class="upload-button" (click)="onUploadClick()">
        <i class="fas fa-cloud-upload-alt"></i> Upload your image
      </button>
    </div>

    <input
      type="file"
      id="imageUpload"
      (change)="onImageSelected($event)"
      accept="image/png, image/jpeg"
      style="display: none"
    />
  </div>
</div>

<app-loading [loading]="loading" [message]="loadingMessage" />
