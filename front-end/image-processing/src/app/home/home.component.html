<div class="photo-editor-container text-center">
  <div
    class="dropzone"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    aria-label="Image drop zone"
  >
    <div class="editor-content">
      <h1>Image Processing</h1>
      <p>Upload an image and apply filters to it.</p>
      <p>Drag & Drop your image here or</p>
      <button
        mat-button
        class="upload-button"
        (click)="onUploadClick()"
        aria-label="Upload your image"
      >
        <i class="fas fa-cloud-upload-alt" aria-hidden="true"></i> Upload your
        image
      </button>
    </div>

    <input
      type="file"
      id="imageUpload"
      (change)="onImageSelected($event)"
      accept="image/png, image/jpeg"
      style="display: none"
      aria-label="Image upload input"
    />
  </div>
</div>

<app-loading *ngIf="loading" [loading]="loading" [message]="loadingMessage" />
