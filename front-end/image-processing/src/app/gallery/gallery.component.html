<div class="gallery">
  <div class="pair" *ngFor="let imagePair of paginatedImagePairs">
    <div class="image-container">
      <img
        [src]="imagePair.originalImage.url"
        alt="Original Image"
        (click)="openDialog(imagePair.originalImage)"
      />
    </div>
    <div class="image-container">
      <img
        [src]="imagePair.filteredImage.url"
        alt="Filtered Image"
        (click)="openDialog(imagePair.filteredImage)"
      />
    </div>
  </div>
</div>

<mat-paginator
  [length]="imagePairs.length"
  [pageSize]="itemsPerPage"
  [pageSizeOptions]="[5, 10, 20]"
  (page)="onPageChange($event)"
/>

<app-loading [loading]="loading" [message]="loadingMessage" *ngIf="loading" />
