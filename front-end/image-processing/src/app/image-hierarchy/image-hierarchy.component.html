<h2 mat-dialog-title class="dialogTitle" aria-label="Image title">
  Image: {{ data.length ? data[data.length - 1].name : "Unknown" }}
</h2>
<mat-dialog-content class="imageDialogContent">
  <div class="imagesColumn">
    <!-- Loop through each displayed image and add SVG arrows between them -->
    <ng-container *ngFor="let imageModel of getDisplayImages(); let i = index">
      <!-- Add SVG arrow if this isn't the first image -->
      <div *ngIf="i > 0" class="arrowContainer">
        <svg
          class="hierarchyArrowSvg"
          viewBox="0 0 100 60"
          width="100"
          height="60"
        >
          <!-- Arrow line -->
          <line x1="50" y1="0" x2="50" y2="40" class="arrowLine"></line>

          <!-- Filter name on the line -->
          <text
            *ngIf="
              imageModel.appliedFilters && imageModel.appliedFilters.length
            "
            x="50"
            y="30"
            class="filterLabel"
            text-anchor="middle"
            dominant-baseline="middle"
          >
            {{
              imageModel.appliedFilters[imageModel.appliedFilters.length - 1]
            }}
          </text>

          <!-- Arrow head -->
          <polygon points="45 40, 50 50, 55 40" class="arrowHead"></polygon>
        </svg>
      </div>

      <!-- Image container -->
      <div
        class="imageContainer"
        [attr.data-aspect-ratio]="imageModel.width / imageModel.height"
      >
        <!-- Loading placeholder that shows when image is not loaded -->
        <div class="image-loading-placeholder" *ngIf="!imageModel.loaded">
          <mat-spinner diameter="30"></mat-spinner>
          <span>Loading image...</span>
        </div>

        <img
          [src]="imageModel.url"
          alt="Image"
          class="image"
          [class.loaded]="imageModel.loaded"
          [class.tall-image]="imageModel.height > imageModel.width * 1.5"
          loading="lazy"
          (error)="onImageError(imageModel)"
          (load)="onImageLoad(imageModel)"
          aria-label="Image"
        />
      </div>
    </ng-container>

    <!-- Show indication if more images are available but not shown -->
    <div *ngIf="displayCount < data.length" class="moreImagesIndicator">
      <p>
        + {{ data.length - displayCount }} more image{{
          data.length - displayCount > 1 ? "s" : ""
        }}
        in hierarchy
      </p>
    </div>
  </div>
</mat-dialog-content>

<mat-dialog-actions id="imageDialogActions" class="imageDialogActions">
  <button
    mat-button
    class="btn btn-secondary"
    (click)="showLessImages()"
    [disabled]="!canShowLess()"
    aria-label="Show less images"
  >
    Show Less <mat-icon>remove</mat-icon>
  </button>
  <button
    mat-button
    class="btn btn-primary"
    (click)="closeDialog()"
    aria-label="Close dialog"
  >
    Close
  </button>
  <button
    mat-button
    class="btn btn-secondary"
    (click)="showMoreImages()"
    [disabled]="!canShowMore()"
    aria-label="Show more images"
  >
    Show More <mat-icon>add</mat-icon>
  </button>
</mat-dialog-actions>
