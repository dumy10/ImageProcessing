name: Test Docker Build

on:
  push:
    branches: [ main ]
    paths:
      - 'back-end/DotNet/ImagesAPI/ImagesAPI/Dockerfile'
      - '.github/workflows/docker_test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'back-end/DotNet/ImagesAPI/ImagesAPI/Dockerfile'
      - '.github/workflows/docker_test.yml'
  # Allow manual triggering
  workflow_dispatch:

jobs:
  test-docker-build:
    name: Test Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./back-end/DotNet/ImagesAPI/ImagesAPI/Dockerfile
          push: false
          load: true
          tags: imagesapi-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          echo "Showing all Docker images:"
          docker images
          
          echo "Starting container with explicit port mapping..."
          # Map the container's 8080 port to host 8080 port
          docker run --name imagesapi-test -d --rm -p 8080:8080 -e ASPNETCORE_ENVIRONMENT=Development imagesapi-test:latest
          
          # Wait for container to initialize
          echo "Waiting for container to initialize (30s)..."
          sleep 30
          
          # Check if container is still running (indicates successful startup)
          echo "Checking if container is running..."
          CONTAINER_RUNNING=$(docker ps -q -f name=imagesapi-test)
          
          if [ -z "$CONTAINER_RUNNING" ]; then
            echo "Container failed to start or exited immediately"
            
            echo "Container logs (if available):"
            docker logs imagesapi-test || echo "No logs available"
            
            echo "Container inspection details:"
            docker inspect imagesapi-test || echo "Container no longer exists"
            
            echo "Getting container exit code and reason:"
            docker inspect imagesapi-test --format='{{.State.ExitCode}}:{{.State.Error}}' || echo "Cannot get exit code"
            
            # Check if the container created any crash dumps or error logs
            echo "Attempting to get any crash dumps..."
            docker cp imagesapi-test:/app/ImagesProcessorLogs/. ./logs/ || echo "No logs directory or cannot access"
            ls -la ./logs/ || echo "No logs to display"
            
            exit 1
          else
            echo "✅ Container started successfully!"
            
            echo "Container logs:"
            docker logs imagesapi-test
            
            echo "Attempting to make a request to the API:"
            curl -v http://localhost:8080/health || echo "Failed to connect to API endpoint"
            
            echo "Container process list:"
            docker exec imagesapi-test ps aux || echo "Cannot execute process list"
            
            # Cleanup
            echo "Stopping container..."
            docker stop imagesapi-test
          fi